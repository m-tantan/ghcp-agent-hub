<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>GHCP Agent Hub</title>
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 300px; min-width: 0; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease, opacity 0.3s ease; overflow: hidden; }

    .sidebar-toggle { position: fixed; top: 12px; left: 8px; z-index: 200; background: #0f3460; color: #e94560; border: 1px solid #0f3460; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }

    .repo-name { flex: 1; font-weight: 500; font-size: 13px; }
    .repo-actions { display: flex; gap: 4px; }

    .repo-color-picker.open { display: flex; }
    .worktree-list { padding: 0 8px 8px 8px; }
    .worktree-item { padding: 8px 12px; margin-top: 4px; background: #16213e; border-radius: 4px; font-size: 12px; }
    .worktree-header { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .worktree-header:hover { color: #e94560; }
    .worktree-branch { color: #4ade80; font-family: monospace; }
    .worktree-path { color: #888; font-size: 10px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .worktree-actions { display: flex; gap: 4px; margin-top: 8px; }
    .worktree-actions button { padding: 4px 8px; font-size: 11px; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .stats-bar { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat-value { font-size: 24px; font-weight: bold; color: #e94560; }
    .stat-label { font-size: 11px; color: #888; }
    .filter-group { display: flex; gap: 4px; align-items: center; margin-left: 16px; }
    .filter-btn { padding: 6px 12px; font-size: 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; color: #888; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: #e94560; color: #ccc; }
    .filter-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .filter-label { font-size: 11px; color: #666; margin-right: 4px; }
    button { background: #0f3460; color: #eee; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    button:hover { background: #e94560; }
    button.primary { background: #e94560; }
    button.primary:hover { background: #ff6b8a; }
    main { flex: 1; overflow: auto; padding: 24px; }
    .sessions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .session-card { background: #16213e; border-radius: 8px; padding: 16px; border: 1px solid #0f3460; transition: border-color 0.2s; }
    .session-card:hover { border-color: #e94560; }
    .session-card.active { border-color: #4ade80; }
    .session-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .session-name-container { display: flex; align-items: center; gap: 4px; }
    .session-name { font-family: monospace; font-size: 12px; color: #888; cursor: pointer; }
    .session-name.has-name { color: #e94560; font-weight: 500; font-family: inherit; }
    .session-name:hover { color: #ff6b8a; }
    .edit-name-btn { background: none; border: none; padding: 2px 4px; font-size: 10px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
    .edit-name-btn:hover { opacity: 1; background: none; }
    .session-id-row { font-family: monospace; font-size: 10px; color: #666; margin-bottom: 4px; }
    .session-id { font-family: monospace; font-size: 11px; color: #888; }
    .session-status { font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: 500; }
    .status-idle { background: #374151; color: #9ca3af; }
    .status-thinking { background: #1e40af; color: #93c5fd; }
    .status-executing { background: #7c3aed; color: #c4b5fd; }
    .status-awaiting { background: #b45309; color: #fcd34d; }
    .status-waiting { background: #047857; color: #6ee7b7; }
    .session-summary { font-size: 13px; color: #ccc; margin-bottom: 12px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .session-meta { display: flex; gap: 12px; font-size: 11px; color: #888; flex-wrap: wrap; }
    .branch-badge { background: #0f3460; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #4ade80; }
    .session-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #0f3460; }
    .session-actions button { flex: 1; padding: 6px 12px; font-size: 11px; }
    .empty-state { text-align: center; padding: 60px 24px; color: #888; }
    .empty-state h2 { font-size: 20px; margin-bottom: 12px; color: #ccc; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.show { display: flex; }
    .modal { background: #16213e; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw; }
    .modal h2 { margin-bottom: 16px; color: #e94560; }
    .modal label { display: block; margin-bottom: 8px; font-size: 13px; color: #ccc; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 10px 12px; margin-bottom: 16px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #eee; font-size: 14px; }
    .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: #e94560; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
    .activity-panel { position: fixed; right: 0; top: 0; width: 400px; height: 100vh; background: #16213e; border-left: 1px solid #0f3460; padding: 24px; transform: translateX(100%); transition: transform 0.3s; overflow-y: auto; z-index: 50; }
    .activity-panel.open { transform: translateX(0); }
    .activity-panel h2 { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .activity-item { padding: 10px 12px; background: #1a1a2e; border-radius: 6px; margin-bottom: 8px; font-size: 12px; }
    .activity-type { font-size: 10px; color: #e94560; margin-bottom: 4px; text-transform: uppercase; }
    .activity-time { font-size: 10px; color: #666; margin-top: 4px; }
    .close-btn { background: none; border: none; color: #888; cursor: pointer; padding: 4px; }
    .close-btn:hover { color: #e94560; background: none; }
    .pending-question { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 2px solid #e94560; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .question-header { color: #e94560; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    .question-text { color: #eee; margin-bottom: 12px; font-size: 14px; line-height: 1.4; }
    .question-choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .choice-btn { background: #0f3460; border: 1px solid #e94560; color: #eee; padding: 10px 14px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; transition: all 0.2s; }
    .choice-btn:hover { background: #e94560; color: #fff; }
    .question-hint { font-size: 11px; color: #666; margin-bottom: 10px; }
    .focus-terminal-btn { background: #0f3460; border: 1px solid #0f3460; color: #eee; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .focus-terminal-btn:hover { background: #16213e; border-color: #e94560; }
    .loading { display: flex; justify-content: center; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #0f3460; border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #searchInput { padding: 8px 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #eee; width: 200px; }
    /* Terminal Panel - Right side, below header, beside sidebar */
    .terminal-panel { display: none; flex-direction: column; overflow: hidden; flex: 1; min-height: 0; }
    .terminal-panel.open { display: flex; }
    .terminal-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
    .terminal-actions { display: flex; gap: 8px; align-items: center; }
    .terminal-actions button { padding: 4px 8px; font-size: 11px; }
    .terminal-actions select { padding: 3px 6px; font-size: 11px; background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 4px; cursor: pointer; }
    .terminal-title { font-size: 14px; color: #e94560; font-weight: 600; }
    .terminal-count { font-size: 12px; color: #8b949e; margin-left: 8px; }
    .terminal-container { flex: 1; overflow: hidden; display: grid; gap: 2px; padding: 2px; background: #30363d; }
    .terminal-instance { display: block; background: #0d1117; overflow: hidden; position: relative; border-radius: 4px; }
    .terminal-instance .xterm { height: 100%; padding: 4px; }
    .terminal-instance-header { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 11px; flex-shrink: 0; }
    .terminal-instance-label { color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; display: flex; align-items: center; gap: 4px; }
    .terminal-instance-close { background: none; border: none; color: #8b949e; cursor: pointer; padding: 2px 4px; font-size: 12px; }
    .terminal-instance-close:hover { color: #e94560; background: none; }
    .terminal-instance-minimize { background: none; border: none; color: #8b949e; cursor: pointer; padding: 2px 4px; font-size: 12px; }
    .terminal-instance-minimize:hover { color: #f59e0b; background: none; }
    .terminal-instance.minimized .xterm, .terminal-instance.minimized > div:last-child { display: none; }
    .terminal-instance.minimized { min-height: 0; max-height: 28px; }
    .terminal-instance-header .term-session-id { color: #4ade80; font-family: monospace; font-size: 10px; margin-left: 6px; cursor: pointer; }
    .terminal-instance-header .term-session-id:hover { text-decoration: underline; }
    @keyframes termFlash { 0%,100% { border-color: #30363d; } 50% { border-color: #e94560; } }
    .terminal-instance.flash { animation: termFlash 0.3s ease 3; border: 2px solid #e94560; }
    /* Resizable content area with splitter */
    .content-area { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
    .content-splitter { height: 6px; background: #30363d; cursor: row-resize; flex-shrink: 0; display: none; position: relative; }
    .content-splitter:hover, .content-splitter.dragging { background: #e94560; }
    .content-splitter::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 30px; height: 2px; background: #8b949e; border-radius: 1px; }
    .terminal-panel-minimized { display: none; height: 32px; background: #161b22; border-top: 1px solid #30363d; padding: 4px 16px; align-items: center; cursor: pointer; flex-shrink: 0; }
    .terminal-panel-minimized.show { display: flex; }
    .terminal-panel-minimized:hover { background: #1c2333; }
    .terminal-panel-minimize-btn { background: none; border: none; color: #8b949e; cursor: pointer; padding: 2px 6px; font-size: 12px; }
    .terminal-panel-minimize-btn:hover { color: #f59e0b; }
    /* Terminal color picker */
    .term-color-btn { background: none; border: 2px solid #8b949e; width: 14px; height: 14px; cursor: pointer; border-radius: 2px; padding: 0; margin: 0 2px; }
    .term-color-btn:hover { border-color: #fff; }
    .term-color-picker { display: none; position: absolute; top: 28px; left: 4px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 6px; z-index: 100; gap: 4px; flex-wrap: wrap; width: 108px; }
    .term-color-picker.open { display: flex; }
    .term-color-swatch { width: 20px; height: 20px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
    .term-color-swatch:hover { border-color: #fff; transform: scale(1.15); }
    /* Terminal maximize */
    .terminal-instance-maximize { background: none; border: none; color: #8b949e; cursor: pointer; padding: 2px 4px; font-size: 12px; }
    .terminal-instance-maximize:hover { color: #4ade80; background: none; }
    .terminal-instance.maximized { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 300; border-radius: 0; }
    /* Session list view */
    .view-toggle { display: flex; gap: 2px; margin-left: 12px; }
    .view-toggle button { background: #1a1a2e; border: 1px solid #0f3460; color: #8b949e; padding: 4px 8px; cursor: pointer; font-size: 14px; border-radius: 4px; }
    .view-toggle button.active { background: #0f3460; color: #e94560; border-color: #e94560; }
    .sessions-list { display: flex; flex-direction: column; gap: 2px; padding: 16px; }
    .session-list-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: #16213e; border-radius: 6px; border: 1px solid #0f3460; cursor: pointer; }
    .session-list-row:hover { border-color: #e94560; background: #1a1a3e; }
    .session-list-row .session-status { flex-shrink: 0; }
    .session-list-name { flex: 1; font-size: 13px; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-list-meta { display: flex; gap: 12px; font-size: 11px; color: #888; flex-shrink: 0; }
    .session-list-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .session-list-actions button { padding: 3px 8px; font-size: 11px; }
    /* Session name in terminal */
    .term-session-name { color: #e6edf3; font-weight: 600; font-size: 11px; margin-right: 4px; }
    .term-custom-name { color: #60a5fa; font-size: 11px; cursor: pointer; margin-right: 4px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .term-custom-name:hover { text-decoration: underline; }
    .term-name-input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; font-size: 11px; padding: 1px 4px; border-radius: 3px; width: 100px; }
    .term-add-name { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 10px; padding: 0 3px; }
    .term-add-name:hover { color: #60a5fa; }
    /* Context Window Bar */
    .context-bar { height: 4px; background: #374151; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .context-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .context-bar-fill.green { background: #4ade80; }
    .context-bar-fill.orange { background: #f59e0b; }
    .context-bar-fill.red { background: #ef4444; }
    .context-bar-label { font-size: 9px; color: #666; margin-top: 2px; text-align: right; }
    /* Stats Panel */
    .stats-panel { position: fixed; top: 0; right: 0; width: 380px; height: 100vh; background: #16213e; border-left: 1px solid #0f3460; padding: 20px; transform: translateX(100%); transition: transform 0.3s; overflow-y: auto; z-index: 60; }
    .stats-panel.open { transform: translateX(0); }
    .stats-panel h2 { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; color: #e94560; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stats-card { background: #1a1a2e; border-radius: 8px; padding: 14px; text-align: center; }
    .stats-card .value { font-size: 22px; font-weight: bold; color: #e94560; }
    .stats-card .label { font-size: 11px; color: #888; margin-top: 4px; }
    .model-row { display: flex; justify-content: space-between; padding: 8px 12px; background: #1a1a2e; border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
    .model-name { color: #4ade80; font-family: monospace; }
    .model-tokens { color: #888; }
    .model-cost { color: #e94560; }
    /* Diff Panel */
    .diff-panel { position: fixed; top: 0; left: 300px; right: 0; bottom: 0; background: #1a1a2e; z-index: 55; display: none; flex-direction: column; }
    .diff-panel.open { display: flex; }
    .diff-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460; }
    .diff-header h2 { font-size: 16px; color: #e94560; }
    .diff-mode-btns { display: flex; gap: 4px; }
    .diff-mode-btn { padding: 4px 10px; font-size: 11px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; color: #888; cursor: pointer; }
    .diff-mode-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .diff-body { display: flex; flex: 1; overflow: hidden; }
    .diff-file-list { width: 250px; border-right: 1px solid #0f3460; overflow-y: auto; padding: 8px; }
    .diff-file-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .diff-file-item:hover { background: #0f3460; }
    .diff-file-item.selected { background: #0f3460; border-left: 2px solid #e94560; }
    .diff-file-name { font-family: monospace; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .diff-file-stats { display: flex; gap: 6px; font-size: 10px; }
    .diff-file-stats .adds { color: #4ade80; }
    .diff-file-stats .dels { color: #ef4444; }
    .diff-content { flex: 1; overflow: auto; padding: 12px; font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; line-height: 1.5; }
    .diff-hunk-header { color: #8b949e; background: #161b22; padding: 4px 8px; margin: 8px 0 4px; border-radius: 4px; font-size: 11px; }
    .diff-line { padding: 1px 8px; white-space: pre-wrap; word-break: break-all; }
    .diff-line.add { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
    .diff-line.remove { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .diff-line.context { color: #8b949e; }
    .diff-summary { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; font-size: 12px; color: #888; }
    /* Deep Search Results */
    .search-results-panel { position: fixed; top: 60px; left: 320px; width: 500px; max-height: 400px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; overflow-y: auto; z-index: 70; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .search-results-panel.open { display: block; }
    .search-result-item { padding: 10px 14px; border-bottom: 1px solid #0f3460; cursor: pointer; font-size: 12px; }
    .search-result-item:hover { background: #0f3460; }
    .search-result-type { font-size: 9px; color: #e94560; text-transform: uppercase; margin-bottom: 2px; }
    .search-result-text { color: #ccc; line-height: 1.4; }
    .search-result-session { font-size: 10px; color: #666; margin-top: 4px; font-family: monospace; }
    .search-result-highlight { background: rgba(233, 69, 96, 0.3); padding: 1px 2px; border-radius: 2px; }

    .code-changes { margin-top: 8px; padding-top: 8px; border-top: 1px solid #0f3460; }
    .code-changes-header { font-size: 11px; color: #888; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .code-changes-header:hover { color: #e94560; }
    .code-changes-list { margin-top: 4px; }
    .code-change-file { font-size: 11px; font-family: monospace; padding: 2px 0; display: flex; justify-content: space-between; }
    .code-change-file .fname { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .code-change-file .fstats { display: flex; gap: 4px; }
    .code-change-file .adds { color: #4ade80; }
    .code-change-file .dels { color: #ef4444; }
    /* Inline Markdown */
    .md-content code { background: #0f3460; padding: 1px 4px; border-radius: 3px; font-family: 'Consolas', monospace; font-size: 0.9em; }
    .md-content pre { background: #0d1117; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 6px 0; }
    .md-content pre code { background: none; padding: 0; }
    .md-content strong { color: #e94560; }
    .md-content a { color: #4ade80; text-decoration: underline; }
    /* Terminal-Only Mode */
    .main-content.terminal-only-mode > header { display: none; }
    .main-content.terminal-only-mode > main#content { display: none; }
    .main-content.terminal-only-mode > .content-splitter { display: none !important; }
    .main-content.terminal-only-mode > .terminal-panel-minimized { display: none !important; }
    .main-content.terminal-only-mode > .terminal-panel { flex: 1 !important; }
    .terminal-only-toggle { background: none; border: 1px solid #30363d; color: #8b949e; cursor: pointer; padding: 3px 8px; font-size: 11px; border-radius: 4px; }
    .terminal-only-toggle:hover { color: #e94560; border-color: #e94560; background: none; }
    .terminal-only-toggle.active { color: #e94560; border-color: #e94560; }
    /* Ctrl+F Terminal Search Overlay */
    .terminal-search-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 400; align-items: flex-start; justify-content: center; padding-top: 20vh; }
    .terminal-search-overlay.open { display: flex; }
    .terminal-search-box { background: #16213e; border: 2px solid #e94560; border-radius: 12px; padding: 16px; width: 450px; max-width: 90vw; box-shadow: 0 12px 40px rgba(0,0,0,0.6); }
    .terminal-search-box input { width: 100%; padding: 12px 14px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; color: #eee; font-size: 15px; outline: none; }
    .terminal-search-box input:focus { border-color: #e94560; }
    .terminal-search-box .search-hint { font-size: 11px; color: #666; margin-top: 8px; }
    .terminal-search-results { margin-top: 8px; max-height: 300px; overflow-y: auto; }
    .terminal-search-result { padding: 10px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #ccc; }
    .terminal-search-result:hover, .terminal-search-result.selected { background: #0f3460; color: #fff; }
    .terminal-search-result .tsr-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .terminal-search-result .tsr-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .terminal-search-result .tsr-meta { font-size: 10px; color: #888; font-family: monospace; }
  </style>
</head>
<body>

      <!-- Minimized terminal bar -->

        <span style="color:#e94560;font-weight:600;font-size:12px;">📺 Terminals</span>

            <button class="terminal-only-toggle" id="terminalOnlyToggle" onclick="toggleTerminalOnlyMode()" title="Terminal-only mode (hide sessions)">⊞ Focus</button>
            <label style="font-size:11px;color:#8b949e;">Per row:</label>
            <select id="terminalsPerRow" title="Terminals per row">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>

            <button id="newTerminalBtn" title="New Terminal">+ New</button>
            <button class="terminal-panel-minimize-btn" id="minimizeTerminalPanelBtn" title="Minimize terminals">▼</button>
            <button id="closeTerminalPanelBtn" title="Close all terminals">✕ Close</button>
          </div>
        </div>
        <div class="terminal-container" id="terminalContainer"></div>
      </div>
    </div>
    <div class="activity-panel" id="activityPanel">
      <h2>Session Activity <button class="close-btn" id="closeActivityBtn">✕</button></h2>
      <div id="pendingQuestionContainer" style="display:none;"></div>
      <div id="activityList"></div>
    </div>
    <!-- Stats Panel -->
    <div class="stats-panel" id="statsPanel">
      <h2>📊 Token Stats <button class="close-btn" id="closeStatsBtn">✕</button></h2>
      <div id="statsContent"></div>
    </div>
    <!-- Diff Panel -->
    <div class="diff-panel" id="diffPanel">
      <div class="diff-header">
        <h2>📝 Code Changes</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="diff-mode-btns">
            <button class="diff-mode-btn active" data-mode="unstaged">Unstaged</button>
            <button class="diff-mode-btn" data-mode="staged">Staged</button>

      </div>
      <div class="diff-summary" id="diffSummary"></div>
    </div>
    <!-- Search Results Panel -->
    <div class="search-results-panel" id="searchResultsPanel"></div>
    <!-- Ctrl+F Terminal Search Overlay -->
    <div class="terminal-search-overlay" id="terminalSearchOverlay">
      <div class="terminal-search-box">
        <input type="text" id="terminalSearchInput" placeholder="Search terminals... (name, session, folder)" autocomplete="off">
        <div class="terminal-search-results" id="terminalSearchResults"></div>
        <div class="search-hint">↑↓ Navigate · Enter Select · Esc Close</div>
      </div>
    </div>
    <div class="modal-overlay" id="worktreeModal">
      <div class="modal">
        <h2>Create Worktree</h2>
        <label>Branch Name</label>
        <input type="text" id="newBranchName" placeholder="feature/my-feature">
        <label>Base Branch</label>
        <select id="baseBranch"><option value="main">main</option></select>
        <div class="modal-actions">
          <button id="cancelWorktreeBtn">Cancel</button>
          <button class="primary" id="createWorktreeBtn">Create</button>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="renameModal">
      <div class="modal">
        <h2>Rename Session</h2>
        <label>Session Name</label>
        <input type="text" id="sessionNameInput" placeholder="My Session Name">
        <p style="font-size:11px;color:#666;margin-top:-8px;margin-bottom:16px">Leave empty to use session ID</p>
        <div class="modal-actions">
          <button id="cancelRenameBtn">Cancel</button>
          <button class="primary" id="saveRenameBtn">Save</button>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="missionModal">
      <div class="modal">
        <h2>🚀 Quick Start Session</h2>
        <label>Mission / Task Description <span style="color:#666;font-weight:normal">(optional)</span></label>
        <textarea id="missionText" placeholder="Leave empty to start an interactive session, or describe your task...&#10;&#10;Example: Fix the login bug where users get logged out after 5 minutes" rows="4" style="width:100%;padding:10px 12px;margin-bottom:16px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#eee;font-size:14px;resize:vertical;font-family:inherit;"></textarea>
        <label>Working Directory</label>
        <select id="missionWorkDir" style="width:100%;padding:10px 12px;margin-bottom:16px;background:#1a1a2e;border:1px solid #0f3460;border-radius:6px;color:#eee;font-size:14px;"></select>
        <div class="modal-actions">
          <button id="cancelMissionBtn">Cancel</button>
          <button class="primary" id="startMissionBtn">🚀 Start Session</button>
        </div>
      </div>
    </div>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>
    const api = window.electronAPI;
    let sessions = [], repositories = [], selectedSessionId = null, currentRepoForWorktree = null, searchQuery = '';
    let currentFilter = 'all'; // 'all', 'active', 'intervention'
    let sessionStates = new Map(); // Track real-time session states for filtering
    let sessionNames = {}; // Track custom session names
    let currentEditSessionId = null; // Session being renamed
    
    // Terminal state
    let terminals = new Map(); // terminalId -> { term, fitAddon }
    let activeTerminalId = null;
    let terminalCounter = 0;
    let embeddedTerminalAvailable = false;

    let searchDebounce = null;
    let currentDiffCwd = null;
    let currentDiffMode = 'unstaged';
    let currentDiffData = null;
    let terminalsPerRow = 2;
    let sessionViewMode = 'tile';
    let maximizedTerminalId = null;
    const terminalColors = {}; // termId -> color
    let repoColors = {}; // repo path -> base color hex
    const TERMINAL_PALETTE = ['#e94560','#4ade80','#60a5fa','#f59e0b','#a78bfa','#fb923c','#22d3ee','#f472b6','#34d399','#fbbf24'];

    // Shade generation: derive lighter/darker variations of a base color for worktrees
    function hexToHSL(hex) {
      let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
      let h = 0, s = 0, l = (max+min)/2;
      if (d > 0) {
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        if (max === r) h = ((g-b)/d + (g<b?6:0));
        else if (max === g) h = ((b-r)/d + 2);
        else h = ((r-g)/d + 4);
        h *= 60;
      }
      return { h, s: s*100, l: l*100 };
    }
    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1-l);
      const f = n => { const k = (n + h/30) % 12; return l - a * Math.max(Math.min(k-3, 9-k, 1), -1); };
      const toHex = x => Math.round(x*255).toString(16).padStart(2,'0');
      return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
    }
    function getWorktreeShade(baseColor, worktreeIndex, totalWorktrees) {
      const { h, s, l } = hexToHSL(baseColor);
      if (totalWorktrees <= 1) return baseColor;
      // Spread lightness from 30% to 70% across worktrees
      const minL = Math.max(25, l - 20);
      const maxL = Math.min(80, l + 20);
      const step = (maxL - minL) / (totalWorktrees - 1);
      const newL = minL + step * worktreeIndex;
      return hslToHex(h, s, newL);
    }

    async function init() {
      // Check if embedded terminal is available
      embeddedTerminalAvailable = await api.terminalAvailable();
      if (!embeddedTerminalAvailable) {
        console.log('Embedded terminal not available - will use external terminals');
      }
      
      // Load saved filter first
      currentFilter = await api.getFilter() || 'all';
      updateFilterButtons();
      
      // Load session names
      sessionNames = await api.getAllSessionNames() || {};
      
      // Load repo colors
      repoColors = await api.getAllRepoColors() || {};
      
      // Load session view mode
      sessionViewMode = await api.getSessionViewMode() || 'tile';
      document.getElementById(sessionViewMode === 'list' ? 'viewListBtn' : 'viewTileBtn').classList.add('active');
      document.getElementById(sessionViewMode === 'list' ? 'viewTileBtn' : 'viewListBtn').classList.remove('active');
      
      // Load terminal-only mode
      terminalOnlyMode = await api.getTerminalOnlyMode() || false;
      if (terminalOnlyMode) applyTerminalOnlyMode();
      
      await loadData();
      api.onSessionsChanged(s => { sessions = s; render(); });
      api.onRepositoriesChanged(r => { repositories = r; renderSidebar(); });
      api.onSessionStateUpdate(updateSessionState);
      
      // Terminal events
      api.onTerminalData(({ terminalId, data }) => {
        const t = terminals.get(terminalId);
        if (t) t.term.write(data);
      });
      api.onTerminalExit(({ terminalId, exitCode }) => {
        console.log(`Terminal ${terminalId} exited with code ${exitCode}`);
        closeTerminal(terminalId);
      });
      
      document.getElementById('refreshBtn').addEventListener('click', loadData);
      document.getElementById('addRepoBtn').addEventListener('click', addRepository);
      document.getElementById('closeActivityBtn').addEventListener('click', closeActivityPanel);
      document.getElementById('sidebarCollapseBtn').addEventListener('click', collapseSidebar);
      document.getElementById('sidebarToggle').addEventListener('click', expandSidebar);
      document.getElementById('cancelWorktreeBtn').addEventListener('click', () => document.getElementById('worktreeModal').classList.remove('show'));
      document.getElementById('createWorktreeBtn').addEventListener('click', createWorktree);
      document.getElementById('cancelRenameBtn').addEventListener('click', () => document.getElementById('renameModal').classList.remove('show'));
      document.getElementById('saveRenameBtn').addEventListener('click', saveSessionName);
      document.getElementById('sessionNameInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveSessionName(); if (e.key === 'Escape') document.getElementById('renameModal').classList.remove('show'); });
      document.getElementById('quickStartBtn').addEventListener('click', showMissionModal);
      document.getElementById('cancelMissionBtn').addEventListener('click', () => document.getElementById('missionModal').classList.remove('show'));
      document.getElementById('startMissionBtn').addEventListener('click', startMissionSession);
      
      // Terminal panel events
      document.getElementById('newTerminalBtn').addEventListener('click', () => showNewTerminalDialog());
      document.getElementById('closeTerminalPanelBtn').addEventListener('click', toggleTerminalPanel);
      document.getElementById('minimizeTerminalPanelBtn').addEventListener('click', minimizeTerminalPanel);
      document.getElementById('terminalPanelMinimized').addEventListener('click', restoreTerminalPanel);
      document.getElementById('terminalsPerRow').addEventListener('change', e => {
        terminalsPerRow = parseInt(e.target.value) || 2;
        updateTerminalGrid();
        setTimeout(() => terminals.forEach(t => t.fitAddon.fit()), 100);
      });
      initSplitter();
      document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); renderSessions(); handleDeepSearch(e.target.value); });
      document.getElementById('statsBtn').addEventListener('click', toggleStatsPanel);
      document.getElementById('closeStatsBtn').addEventListener('click', () => document.getElementById('statsPanel').classList.remove('open'));
      document.getElementById('closeDiffBtn').addEventListener('click', () => document.getElementById('diffPanel').classList.remove('open'));
      // Diff mode buttons
      document.querySelectorAll('.diff-mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.diff-mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentDiffMode = btn.dataset.mode;
          if (currentDiffCwd) loadDiff(currentDiffCwd, currentDiffMode);
        });
      });
      // Close search results when clicking outside
      document.addEventListener('click', e => {
        const panel = document.getElementById('searchResultsPanel');
        const input = document.getElementById('searchInput');
        if (!panel.contains(e.target) && e.target !== input) panel.classList.remove('open');
      });
      // Setup filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          api.saveFilter(currentFilter); // Persist filter selection
          renderSessions();
        });
      });
      
      // Restore saved terminals from previous session
      if (embeddedTerminalAvailable) {
        const saved = await api.getSavedTerminals();
        if (saved && saved.length > 0) {
          for (const st of saved) {
            await openEmbeddedTerminal(st.cwd, st.sessionId, st.mission || null, st.color);
          }
          api.setSavedTerminals([]);
        }
      }
    }

    function updateFilterButtons() {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.filter === currentFilter);
      });
    }

    async function loadData() {
      [sessions, repositories] = await Promise.all([api.getSessions(), api.getRepositories()]);
      render();
    }

    function render() { renderSidebar(); renderSessions(); updateStats(); }
    function updateStats() {
      document.getElementById('totalSessions').textContent = sessions.length;
      // Count active sessions based on real-time states
      const activeCount = sessions.filter(s => {
        const state = sessionStates.get(s.id);
        if (state?.status) {
          const t = state.status.type;
          return t === 'thinking' || t === 'executingTool' || t === 'awaitingApproval';
        }
        return s.isActive;
      }).length;
      document.getElementById('activeSessions').textContent = activeCount;
      document.getElementById('repoCount').textContent = repositories.length;
    }

    function renderSidebar() {
      const el = document.getElementById('repoList');
      if (!repositories.length) { el.innerHTML = '<div style="text-align:center;padding:24px;color:#666"><p>No repos</p><p style="font-size:11px;margin-top:8px">Click "Add Repo"</p></div>'; return; }
      el.innerHTML = repositories.map(r => {
        const repoColor = repoColors[r.path] || null;
        const colorPickerHtml = `<div class="repo-color-picker" id="repoColorPicker-${escJs(r.path)}">${TERMINAL_PALETTE.map(c => `<div class="term-color-swatch" style="background:${c}" onclick="event.stopPropagation(); setRepoColor('${escJs(r.path)}','${c}')"></div>`).join('')}</div>`;
        const borderStyle = repoColor ? ` style="border-left: 3px solid ${repoColor}"` : '';
        return `
        <div class="repo-item"${borderStyle}>
          <div class="repo-header ${r.isExpanded?'expanded':''}" onclick="toggleRepo('${escJs(r.path)}')" style="position:relative">
            <button class="repo-color-btn" style="background:${repoColor || '#555'}" onclick="event.stopPropagation(); toggleRepoColorPicker('${escJs(r.path)}')" title="Set repo color"></button>
            ${colorPickerHtml}
            <span class="chevron">▶</span><span class="repo-name">📁 ${esc(r.path.split(/[/\\]/).pop())}</span>
            <div class="repo-actions" onclick="event.stopPropagation()">
              <button onclick="showCreateWorktree('${escJs(r.path)}')" title="New Worktree">🌿</button>
              <button onclick="removeRepo('${escJs(r.path)}')" title="Remove">✕</button>
            </div>
          </div>
          ${r.isExpanded ? `<div class="worktree-list">${r.worktrees.map((w, wi) => {
            const shade = repoColor ? getWorktreeShade(repoColor, wi, r.worktrees.length) : null;
            const wtBorder = shade ? `border-left: 3px solid ${shade};` : '';
            return `
            <div class="worktree-item" style="${wtBorder}">
              <div class="worktree-header"><span>${w.isWorktree?'🌿':'📂'}</span><span class="worktree-branch">${esc(w.name)}</span><span style="color:#888;font-size:10px">(${w.sessions.length})</span></div>
              <div class="worktree-path">${esc(w.path)}</div>
              <div class="worktree-actions">
                <button onclick="openTerm('${escJs(w.path)}')">▶ New</button>
                <button onclick="api.openFolder('${escJs(w.path)}')">📂</button>
                ${w.isWorktree?`<button onclick="delWorktree('${escJs(r.path)}','${escJs(w.path)}')" style="color:#e94560">🗑</button>`:''}
              </div>
            </div>`}).join('')}</div>` : ''}
        </div>`;
      }).join('');
    }

    function setSessionViewMode(mode) {
      sessionViewMode = mode;
      document.getElementById('viewTileBtn').classList.toggle('active', mode === 'tile');
      document.getElementById('viewListBtn').classList.toggle('active', mode === 'list');
      api.setSessionViewMode(mode);
      renderSessions();
    }

    function renderSessions() {
      const el = document.getElementById('content');
      // Apply search filter (include custom session names)
      let f = searchQuery ? sessions.filter(s => ((s.summary||'')+(s.firstMessage||'')+s.branchName+s.id+(sessionNames[s.id]||'')).toLowerCase().includes(searchQuery)) : sessions;
      // Apply status filter
      if (currentFilter === 'active') {
        f = f.filter(s => {
          const state = sessionStates.get(s.id);
          if (state?.status) {
            const t = state.status.type;
            return t === 'thinking' || t === 'executingTool' || t === 'awaitingApproval';
          }
          return s.isActive;
        });
      } else if (currentFilter === 'intervention') {
        f = f.filter(s => {
          const state = sessionStates.get(s.id);
          if (state?.status) {
            const t = state.status.type;
            return t === 'waitingForUser' || t === 'awaitingApproval';
          }
          return false;
        });
      }
      if (!f.length) { el.innerHTML = `<div class="empty-state"><h2>${searchQuery || currentFilter !== 'all' ?'No matches':'No Sessions'}</h2><p style="color:#666;margin-top:8px">${currentFilter === 'active' ? 'No active sessions found' : currentFilter === 'intervention' ? 'No sessions need input' : ''}</p></div>`; return; }
      
      if (sessionViewMode === 'list') {
        el.innerHTML = `<div class="sessions-list">${f.map(s => {
          const state = sessionStates.get(s.id);
          const status = state?.status || (s.isActive ? { type: 'executingTool' } : { type: 'idle' });
          const statusText = getStatusText(status);
          const statusClass = getStatusClass(status);
          const customName = sessionNames[s.id];
          const displayName = customName || s.id.slice(0,8) + '...';
          return `
          <div class="session-list-row" data-session-id="${s.id}">
            <span class="session-status ${statusClass}" style="font-size:10px;">${statusText}</span>
            <span class="session-list-name" title="${esc(s.summary||s.firstMessage||'')}">${esc(displayName)}</span>

            </span>
          </div>`;
        }).join('')}</div>`;
      } else {
        el.innerHTML = `<div class="sessions-grid">${f.map(s => {
          const state = sessionStates.get(s.id);
          const status = state?.status || (s.isActive ? { type: 'executingTool' } : { type: 'idle' });
          const statusText = getStatusText(status);
          const statusClass = getStatusClass(status);
          const customName = sessionNames[s.id];
          const displayName = customName || s.id.slice(0,8) + '...';
          return `
          <div class="session-card ${s.isActive?'active':''}" data-session-id="${s.id}">
            <div class="session-header">
              <span class="session-name-container">
                <span class="session-name ${customName ? 'has-name' : ''}" title="Click to rename">${esc(displayName)}</span>
                <button class="edit-name-btn" onclick="event.stopPropagation(); editSessionName('${s.id}', '${esc(customName || '')}')" title="Rename session">✏️</button>
              </span>
              <span class="session-status ${statusClass}">${statusText}</span>
            </div>
            ${customName ? `<div class="session-id-row">ID: ${s.id.slice(0,8)}...</div>` : ''}
            <div class="session-summary">${esc(s.summary||s.firstMessage||'No summary')}</div>
            <div class="session-meta"><span class="branch-badge">${esc(s.branchName)}</span><span>📝 ${s.messageCount}</span><span>⏱️ ${timeAgo(new Date(s.lastActivityAt))}</span></div>
            ${renderContextBar(s.id)}

            <div class="session-actions"><button onclick="viewActivity('${s.id}')">📊 Activity</button><button onclick="viewDiff('${escJs(s.projectPath)}')">📝 Changes</button><button onclick="resumeSess('${s.id}','${escJs(s.projectPath)}')">▶ Resume</button></div>
          </div>`;
        }).join('')}</div>`;
      }
    }

    function getStatusText(status) {
      if (!status) return 'Idle';
      switch (status.type) {
        case 'thinking': return 'Thinking...';
        case 'executingTool': return `Running: ${status.name || 'tool'}`;
        case 'awaitingApproval': return `Awaiting: ${status.tool || 'approval'}`;
        case 'waitingForUser': return 'Waiting for Input';
        default: return 'Idle';
      }
    }

    function getStatusClass(status) {
      if (!status) return 'status-idle';
      switch (status.type) {
        case 'thinking': return 'status-thinking';
        case 'executingTool': return 'status-executing';
        case 'awaitingApproval': return 'status-awaiting';
        case 'waitingForUser': return 'status-waiting';
        default: return 'status-idle';
      }
    }

    function updateSessionState(u) {
      // Store state for filtering
      if (u.state?.status) {
        sessionStates.set(u.sessionId, u.state);
      }
      const card = document.querySelector(`[data-session-id="${u.sessionId}"]`);
      if (!card || !u.state?.status) return;
      const st = card.querySelector('.session-status'), {type} = u.state.status;
      let txt = getStatusText(u.state.status), cls = getStatusClass(u.state.status);
      st.textContent = txt; st.className = `session-status ${cls}`;
      if (selectedSessionId === u.sessionId) {
        if (u.state.recentActivities) renderActivities(u.state.recentActivities);
        if (u.state.pendingQuestion) renderPendingQuestion(u.state.pendingQuestion, u.sessionId);
        else hidePendingQuestion();
      }
      // Re-render if filter might exclude/include this session
      if (currentFilter !== 'all') renderSessions();
    }

    function initSplitter() {
      const splitter = document.getElementById('contentSplitter');
      const main = document.getElementById('content');
      const panel = document.getElementById('terminalPanel');
      const container = document.querySelector('.main-content');
      let dragging = false;
      
      splitter.addEventListener('mousedown', e => {
        dragging = true;
        splitter.classList.add('dragging');
        e.preventDefault();
      });
      
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const rect = container.getBoundingClientRect();
        // Subtract header height
        const headerH = container.querySelector('header').getBoundingClientRect().height;
        const available = rect.height - headerH - 6; // 6px splitter
        const mouseY = e.clientY - rect.top - headerH;
        const pct = Math.max(10, Math.min(90, (mouseY / available) * 100));
        main.style.flex = `0 0 ${pct}%`;
        panel.style.flex = `1 1 ${100 - pct}%`;
      });
      
      document.addEventListener('mouseup', () => {
        if (dragging) {
          dragging = false;
          splitter.classList.remove('dragging');
          setTimeout(() => terminals.forEach(t => t.fitAddon.fit()), 50);
        }
      });
    }
    
    function updateTerminalGrid() {
      const container = document.getElementById('terminalContainer');
      const count = terminals.size;
      const cols = terminalsPerRow;
      const rows = Math.max(1, Math.ceil(count / cols));
      container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      container.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      // Update count labels
      const countEl = document.getElementById('terminalCount');
      if (countEl) countEl.textContent = count > 0 ? `(${count})` : '';
      const countMin = document.getElementById('terminalCountMin');
      if (countMin) countMin.textContent = count > 0 ? `(${count} open)` : '';
    }
    
    async function openEmbeddedTerminal(cwd, sessionId = null, mission = null, initialColor = null) {
      // Duplicate detection: flash existing terminal instead of opening a new one
      for (const [tid, t] of terminals) {
        if ((sessionId && t.sessionId === sessionId) || (!sessionId && !t.sessionId && t.cwd === cwd)) {
          showTerminalPanel();
          const wrapper = document.getElementById(`terminal-${tid}`);
          if (wrapper) {
            wrapper.classList.remove('flash');
            void wrapper.offsetWidth;
            wrapper.classList.add('flash');
            wrapper.addEventListener('animationend', () => wrapper.classList.remove('flash'), { once: true });
          }
          t.term.focus();
          return tid;
        }
      }
      
      const termId = `term-${++terminalCounter}`;
      await api.terminalCreate(termId, cwd, sessionId, mission);
      
      const term = new Terminal({
        cursorBlink: true, fontSize: 13,
        fontFamily: 'Consolas, "Courier New", monospace',
        theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#e94560', selection: 'rgba(233, 69, 96, 0.3)' }
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      
      // Build label with session name + folder + full session ID
      const folderName = cwd.split(/[/\\]/).pop();
      const sessName = sessionId ? (sessionNames[sessionId] || null) : null;
      const nameHtml = sessName ? `<span class="term-session-name">${esc(sessName)}</span>` : '';
      const sessionLabel = sessionId ? `<span class="term-session-id" title="Click to copy: ${esc(sessionId)}" onclick="event.stopPropagation(); navigator.clipboard.writeText('${escJs(sessionId)}')">${esc(sessionId)}</span>` : '';
      const folderHtml = `<span style="color:#8b949e">${esc(folderName)}</span>`;
      
      // Color picker
      const colorPickerHtml = `<div class="term-color-picker" id="colorPicker-${termId}">${TERMINAL_PALETTE.map(c => `<div class="term-color-swatch" style="background:${c}" onclick="event.stopPropagation(); setTermColor('${termId}','${c}')"></div>`).join('')}</div>`;
      let color = initialColor || (sessionId ? (await api.getTerminalColor(sessionId)) : null);
      
      // Auto-derive color from repo color scheme if no explicit color
      if (!color) {
        const normCwd = cwd.replace(/\\/g, '/').toLowerCase();
        for (const r of repositories) {
          const baseColor = repoColors[r.path];
          if (!baseColor) continue;
          const normRepo = r.path.replace(/\\/g, '/').toLowerCase();
          for (let wi = 0; wi < r.worktrees.length; wi++) {
            const normWt = r.worktrees[wi].path.replace(/\\/g, '/').toLowerCase();
            if (normCwd === normWt || normCwd.startsWith(normWt + '/')) {
              color = getWorktreeShade(baseColor, wi, r.worktrees.length);
              break;
            }
          }
          if (color) break;
        }
      }
      
      const wrapper = document.createElement('div');
      wrapper.className = 'terminal-instance';
      wrapper.id = `terminal-${termId}`;
      wrapper.style.display = 'flex';
      wrapper.style.flexDirection = 'column';
      
      const header = document.createElement('div');
      header.className = 'terminal-instance-header';
      header.style.position = 'relative';
      if (color) header.style.borderBottom = `3px solid ${color}`;
      
      // Custom terminal name (editable memo)
      const customNameId = `termName-${termId}`;
      const nameDisplayHtml = `<span class="term-custom-name" id="${customNameId}" onclick="event.stopPropagation(); editTermName('${termId}')" title="Click to add memo"></span><button class="term-add-name" onclick="event.stopPropagation(); editTermName('${termId}')" title="Add memo">✏</button>`;
      
      header.innerHTML = `
        <div style="display:flex;align-items:center;gap:4px;">
          <button class="term-color-btn" style="background:${color || '#8b949e'}" onclick="event.stopPropagation(); toggleColorPicker('${termId}')" title="Change color"></button>
          ${colorPickerHtml}
          <button class="terminal-instance-minimize" onclick="toggleMinimizeTerminal('${termId}')" title="Minimize">&#x25BC;</button>
          <button class="terminal-instance-maximize" onclick="toggleMaximizeTerminal('${termId}')" title="Maximize">&#x26F6;</button>
        </div>
        <span class="terminal-instance-label" title="${esc(cwd)}">${nameHtml}${nameDisplayHtml}${folderHtml} ${sessionLabel}</span>
        <div style="display:flex;align-items:center;margin-left:20px;">
          <button class="terminal-instance-close" onclick="closeTerminal('${termId}')" title="Close">&#x2715;</button>
        </div>`;
      wrapper.appendChild(header);
      
      const termArea = document.createElement('div');
      termArea.style.cssText = 'flex:1;overflow:hidden;';
      wrapper.appendChild(termArea);
      
      document.getElementById('terminalContainer').appendChild(wrapper);
      term.open(termArea);
      fitAddon.fit();
      
      term.onData(data => api.terminalWrite(termId, data));
      term.onResize(({ cols, rows }) => api.terminalResize(termId, cols, rows));
      
      // Paste via Ctrl+V
      term.attachCustomKeyEventHandler(e => {
        if (e.type === 'keydown' && e.ctrlKey && e.key === 'v') {
          navigator.clipboard.readText().then(text => {
            if (text) api.terminalWrite(termId, text);
          }).catch(() => {});
          return false;
        }
        if (e.type === 'keydown' && e.ctrlKey && e.key === 'f') {
          return false; // Let document handler open terminal search
        }
        return true;
      });
      
      terminals.set(termId, { term, fitAddon, cwd, sessionId, color });
      if (color) terminalColors[termId] = color;
      
      showTerminalPanel();
      updateTerminalGrid();
      setTimeout(() => { fitAddon.fit(); term.focus(); }, 150);
      return termId;
    }

    function toggleMaximizeTerminal(termId) {

    function addTerminalTab(termId, label) {}
    function activateTerminal(termId) {
      const t = terminals.get(termId);
      if (t) {
        setTimeout(() => {
          t.fitAddon.fit();
          t.term.focus();
        }, 50);
      }
    }
    
    function closeTerminal(termId) {
      // Clean up maximized state
      if (maximizedTerminalId === termId) maximizedTerminalId = null;
      
      const t = terminals.get(termId);
      if (t) {
        t.term.dispose();
        api.terminalDestroy(termId);
        terminals.delete(termId);
      }
      delete terminalColors[termId];
      
      const container = document.getElementById(`terminal-${termId}`);
      if (container) container.remove();
      
      updateTerminalGrid();
      
      if (terminals.size === 0) {
        activeTerminalId = null;
        hideTerminalPanel();
      } else {
        setTimeout(() => terminals.forEach(t => t.fitAddon.fit()), 100);
      }
    }
    
    function showNewTerminalDialog() {
      // Use the first available working directory
      let defaultCwd = '';
      if (repositories.length > 0) {
        defaultCwd = repositories[0].path;
        if (repositories[0].worktrees?.length > 0) {
          defaultCwd = repositories[0].worktrees[0].path;
        }
      }
      
      if (defaultCwd) {
        openEmbeddedTerminal(defaultCwd);
      } else {
        alert('Please add a repository first');
      }
    }
    
    // Window resize handler
    window.addEventListener('resize', () => {
      if (document.getElementById('terminalPanel').classList.contains('open')) {
        terminals.forEach(t => t.fitAddon.fit());
      }
    });
    function closeActivityPanel() { document.getElementById('activityPanel').classList.remove('open'); if (selectedSessionId) { api.stopMonitoring(selectedSessionId); selectedSessionId = null; } }
    function timeAgo(d) { const s = Math.floor((Date.now()-d.getTime())/1000); return s<60?'now':s<3600?`${Math.floor(s/60)}m`:s<86400?`${Math.floor(s/3600)}h`:`${Math.floor(s/86400)}d`; }
    function esc(s) { return s ? s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) : ''; }
    function escJs(s) { return s ? s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"') : ''; }

    // === MARKDOWN RENDERING (Gap 14) ===
    function renderMarkdown(text) {
      if (!text) return '';
      let s = esc(text);
      // Code blocks (```...```)
      s = s.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      // Inline code (`...`)
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold (**...**)
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Italic (*...*)
      s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      // Line breaks
      s = s.replace(/\n/g, '<br>');
      return `<span class="md-content">${s}</span>`;
    }

    // === CONTEXT WINDOW BAR (Gap 12) ===
    function renderContextBar(sessionId) {
      const state = sessionStates.get(sessionId);
      if (!state || !state.totalOutputTokens) return '';
      const totalTokens = (state.inputTokens || 0) + (state.totalOutputTokens || 0);
      const maxContext = 200000; // Default context window estimate
      const pct = Math.min(100, (totalTokens / maxContext) * 100);
      const colorClass = pct > 90 ? 'red' : pct > 75 ? 'orange' : 'green';
      const label = formatTokens(totalTokens) + ' / ' + formatTokens(maxContext) + ' (~' + Math.round(pct) + '%)';
      return `<div class="context-bar"><div class="context-bar-fill ${colorClass}" style="width:${pct}%"></div></div><div class="context-bar-label">${label}</div>`;
    }

    function formatTokens(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
      return n.toString();
    }

    // === STATS PANEL (Gap 6) ===
    async function toggleStatsPanel() {
      const panel = document.getElementById('statsPanel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) {
        await refreshStats();
      }
    }

    async function refreshStats() {
      const stats = await api.getGlobalStats();
      if (!stats) return;
      const el = document.getElementById('statsContent');
      
      const totalTokens = stats.totalInputTokens + stats.totalOutputTokens;
      
      let modelHtml = '';
      if (stats.modelBreakdown) {
        const models = Object.entries(stats.modelBreakdown);
        if (models.length > 0) {
          modelHtml = '<h3 style="font-size:13px;color:#ccc;margin:16px 0 8px;">By Model</h3>' +
            models.map(([name, m]) => `
              <div class="model-row">
                <span class="model-name">${esc(name)}</span>
                <span class="model-tokens">${formatTokens(m.inputTokens + m.outputTokens)} tokens</span>
                <span class="model-cost">$${m.cost.toFixed(2)}</span>
              </div>`).join('');
        }
      }
      
      el.innerHTML = `
        <div class="stats-grid">
          <div class="stats-card"><div class="value">${formatTokens(totalTokens)}</div><div class="label">Total Tokens</div></div>
          <div class="stats-card"><div class="value">$${stats.estimatedCostUsd.toFixed(2)}</div><div class="label">Est. Cost</div></div>
          <div class="stats-card"><div class="value">${stats.sessionCount}</div><div class="label">Sessions</div></div>
          <div class="stats-card"><div class="value">${stats.totalMessages}</div><div class="label">Messages</div></div>
          <div class="stats-card"><div class="value">${formatTokens(stats.totalInputTokens)}</div><div class="label">Input Tokens</div></div>
          <div class="stats-card"><div class="value">${formatTokens(stats.totalOutputTokens)}</div><div class="label">Output Tokens</div></div>
          <div class="stats-card"><div class="value">${formatTokens(stats.totalCacheReadTokens)}</div><div class="label">Cache Read</div></div>
          <div class="stats-card"><div class="value">${formatTokens(stats.totalCacheCreationTokens)}</div><div class="label">Cache Created</div></div>
        </div>
        ${modelHtml}
      `;
    }

    // === DIFF VIEW (Gaps 3, 4, 5) ===
    async function viewDiff(cwd) {
      currentDiffCwd = cwd;
      currentDiffMode = 'unstaged';
      document.querySelectorAll('.diff-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === 'unstaged'));
      document.getElementById('diffPanel').classList.add('open');
      await loadDiff(cwd, 'unstaged');
    }

    async function loadDiff(cwd, mode) {
      const diff = await api.getDiff(cwd, mode);
      currentDiffData = diff;
      
      // Render file list
      const fileListEl = document.getElementById('diffFileList');
      if (!diff.files || diff.files.length === 0) {
        fileListEl.innerHTML = '<div style="padding:16px;color:#666;font-size:12px;text-align:center;">No changes found</div>';
        document.getElementById('diffContent').innerHTML = '<div style="padding:24px;color:#666;text-align:center;">No changes to display</div>';
        document.getElementById('diffSummary').textContent = '';
        return;
      }
      
      fileListEl.innerHTML = diff.files.map((f, i) => `
        <div class="diff-file-item ${i===0?'selected':''}" onclick="selectDiffFile(${i})">
          <span class="diff-file-name" title="${esc(f.path)}">${statusIcon(f.status)} ${esc(f.path.split(/[/\\]/).pop())}</span>
          <span class="diff-file-stats"><span class="adds">+${f.additions}</span><span class="dels">-${f.deletions}</span></span>
        </div>`).join('');
      
      // Show first file diff
      if (diff.diffs && diff.diffs.length > 0) renderFileDiff(diff.diffs[0]);
      
      // Summary
      document.getElementById('diffSummary').textContent = `${diff.summary.filesChanged} file(s) changed, +${diff.summary.additions} -${diff.summary.deletions}`;
    }

    function statusIcon(status) {
      switch(status) {
        case 'added': return '🟢';
        case 'deleted': return '🔴';
        case 'renamed': return '🔵';
        default: return '🟡';
      }
    }

    function selectDiffFile(idx) {
      document.querySelectorAll('.diff-file-item').forEach((el, i) => el.classList.toggle('selected', i === idx));
      if (currentDiffData?.diffs?.[idx]) renderFileDiff(currentDiffData.diffs[idx]);
    }

    function renderFileDiff(fileDiff) {
      const el = document.getElementById('diffContent');
      if (!fileDiff.hunks || fileDiff.hunks.length === 0) {
        el.innerHTML = '<div style="padding:24px;color:#666;">Binary file or no textual changes</div>';
        return;
      }
      el.innerHTML = fileDiff.hunks.map(h => `
        <div class="diff-hunk-header">${esc(h.header)}</div>
        ${h.lines.map(l => `<div class="diff-line ${l.type}">${l.type === 'add' ? '+' : l.type === 'remove' ? '-' : ' '}${esc(l.content)}</div>`).join('')}
      `).join('');
    }

    // Load code changes for session cards
    async function loadCodeChanges(sessionId, cwd) {
      try {
        const changes = await api.getCodeChanges(cwd);
        const el = document.getElementById(`code-changes-${sessionId}`);
        if (!el || !changes || changes.length === 0) return;
        
        el.style.display = 'block';
        const shown = changes.slice(0, 5);
        el.innerHTML = `
          <div class="code-changes-header" onclick="viewDiff('${escJs(cwd)}')">📝 ${changes.length} file(s) changed</div>
          <div class="code-changes-list">${shown.map(f => `
            <div class="code-change-file">
              <span class="fname">${esc(f.path)}</span>
              <span class="fstats"><span class="adds">+${f.additions}</span><span class="dels">-${f.deletions}</span></span>
            </div>`).join('')}
          ${changes.length > 5 ? `<div style="font-size:10px;color:#666;margin-top:4px;">...and ${changes.length-5} more</div>` : ''}
          </div>`;
      } catch {}
    }

    // === DEEP SEARCH (Gap 11) ===
    function handleDeepSearch(query) {
      clearTimeout(searchDebounce);
      if (!query || query.length < 3) {
        document.getElementById('searchResultsPanel').classList.remove('open');
        return;
      }
      searchDebounce = setTimeout(async () => {
        const results = await api.deepSearch(query);
        renderSearchResults(results, query);
      }, 500);
    }

    function renderSearchResults(results, query) {
      const panel = document.getElementById('searchResultsPanel');
      if (!results || results.length === 0) {
        panel.classList.remove('open');
        return;
      }
      panel.classList.add('open');
      panel.innerHTML = `<div style="padding:10px 14px;font-size:11px;color:#888;border-bottom:1px solid #0f3460;">🔍 ${results.length} result(s) across sessions</div>` +
        results.slice(0, 20).map(r => `
          <div class="search-result-item" onclick="jumpToSession('${r.sessionId}')">
            <div class="search-result-type">${r.matchType}</div>
            <div class="search-result-text">${highlightMatch(esc(r.text), query)}</div>
            <div class="search-result-session">${r.sessionId.slice(0,8)}... ${r.timestamp ? '· ' + new Date(r.timestamp).toLocaleString() : ''}</div>
          </div>`).join('');
    }

    function highlightMatch(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<span class="search-result-highlight">$1</span>');
    }

    function jumpToSession(sessionId) {
      document.getElementById('searchResultsPanel').classList.remove('open');
      const card = document.querySelector(`[data-session-id="${sessionId}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.boxShadow = '0 0 12px #e94560';
        setTimeout(() => card.style.boxShadow = '', 2000);
      }
      viewActivity(sessionId);
    }

    // === TERMINAL-ONLY MODE ===
    let terminalOnlyMode = false;

    async function toggleTerminalOnlyMode() {
      terminalOnlyMode = !terminalOnlyMode;
      applyTerminalOnlyMode();
      await api.setTerminalOnlyMode(terminalOnlyMode);
    }

    function applyTerminalOnlyMode() {
      const mc = document.querySelector('.main-content');
      const btn = document.getElementById('terminalOnlyToggle');
      if (terminalOnlyMode) {
        mc.classList.add('terminal-only-mode');
        btn.classList.add('active');
        btn.textContent = '⊞ Sessions';
        // Ensure terminal panel is visible
        const panel = document.getElementById('terminalPanel');
        if (!panel.classList.contains('open')) showTerminalPanel();
      } else {
        mc.classList.remove('terminal-only-mode');
        btn.classList.remove('active');
        btn.textContent = '⊞ Focus';
      }
      setTimeout(() => terminals.forEach(t => t.fitAddon.fit()), 100);
    }

    // === CTRL+F TERMINAL SEARCH ===
    let termSearchSelectedIdx = 0;
    let termSearchMatches = [];

    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'f') {
        e.preventDefault();
        openTerminalSearch();
      }
    });

    function openTerminalSearch() {
      const overlay = document.getElementById('terminalSearchOverlay');
      const input = document.getElementById('terminalSearchInput');
      overlay.classList.add('open');
      input.value = '';
      termSearchSelectedIdx = 0;
      termSearchMatches = [];
      renderTerminalSearchResults('');
      setTimeout(() => input.focus(), 50);
    }

    function closeTerminalSearch() {
      document.getElementById('terminalSearchOverlay').classList.remove('open');
    }

    document.getElementById('terminalSearchOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('terminalSearchOverlay')) closeTerminalSearch();
    });

    document.getElementById('terminalSearchInput').addEventListener('input', e => {
      termSearchSelectedIdx = 0;
      renderTerminalSearchResults(e.target.value);
    });

    document.getElementById('terminalSearchInput').addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeTerminalSearch(); return; }
      if (e.key === 'ArrowDown') { e.preventDefault(); termSearchSelectedIdx = Math.min(termSearchSelectedIdx + 1, termSearchMatches.length - 1); highlightTermSearchResult(); return; }
      if (e.key === 'ArrowUp') { e.preventDefault(); termSearchSelectedIdx = Math.max(termSearchSelectedIdx - 1, 0); highlightTermSearchResult(); return; }
      if (e.key === 'Enter') {
        e.preventDefault();
        if (termSearchMatches.length > 0) selectTermSearchResult(termSearchMatches[termSearchSelectedIdx].termId);
        return;
      }
    });

    function renderTerminalSearchResults(query) {
      const results = document.getElementById('terminalSearchResults');
      const q = query.toLowerCase().trim();
      termSearchMatches = [];

      for (const [termId, t] of terminals) {
        const folderName = (t.cwd || '').split(/[/\\]/).pop() || '';
        const sessName = t.sessionId ? (sessionNames[t.sessionId] || '') : '';
        const sessId = t.sessionId || '';
        const memo = t.customName || '';
        const searchable = `${memo} ${sessName} ${folderName} ${sessId}`.toLowerCase();
        if (!q || searchable.includes(q)) {
          termSearchMatches.push({ termId, memo, sessName, folderName, sessId, color: t.color || '#8b949e' });
        }
      }

      if (termSearchMatches.length === 0 && terminals.size === 0) {
        results.innerHTML = '<div style="padding:12px;color:#666;text-align:center;font-size:12px;">No terminals open</div>';
        return;
      }
      if (termSearchMatches.length === 0) {
        results.innerHTML = '<div style="padding:12px;color:#666;text-align:center;font-size:12px;">No matching terminals</div>';
        return;
      }

      results.innerHTML = termSearchMatches.map((m, i) => {
        const label = m.memo || m.sessName || m.folderName || m.termId;
        const meta = m.sessId ? m.sessId.slice(0, 8) + '...' : m.folderName;
        return `<div class="terminal-search-result ${i === termSearchSelectedIdx ? 'selected' : ''}" onclick="selectTermSearchResult('${m.termId}')" data-idx="${i}">
          <span class="tsr-color" style="background:${m.color}"></span>
          <span class="tsr-name">${esc(label)}</span>
          <span class="tsr-meta">${esc(meta)}</span>
        </div>`;
      }).join('');
    }

    function highlightTermSearchResult() {
      document.querySelectorAll('.terminal-search-result').forEach((el, i) => {
        el.classList.toggle('selected', i === termSearchSelectedIdx);
      });
      const sel = document.querySelector('.terminal-search-result.selected');
      if (sel) sel.scrollIntoView({ block: 'nearest' });
    }

    function selectTermSearchResult(termId) {
      closeTerminalSearch();
      const t = terminals.get(termId);
      if (!t) return;
      const wrapper = document.getElementById(`terminal-${termId}`);
      if (!wrapper) return;
      // Unminimize if needed
      if (wrapper.classList.contains('minimized')) {
        wrapper.classList.remove('minimized');
        wrapper.querySelector('.terminal-instance-minimize').textContent = '▼';
      }
      // Ensure terminal panel is visible
      showTerminalPanel();
      // Flash & focus
      wrapper.classList.remove('flash');
      void wrapper.offsetWidth;
      wrapper.classList.add('flash');
      wrapper.addEventListener('animationend', () => wrapper.classList.remove('flash'), { once: true });
      wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => { t.fitAddon.fit(); t.term.focus(); }, 100);
    }

    init();
  </script>
</body>
</html>
